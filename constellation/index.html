<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Grace Wei-li Juan — a constellation</title>
<meta name="description" content="A small constellation of the things Grace makes, reads, and is influenced by. Drag a star, watch the rest follow." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@400;500&display=swap" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<svg id="sky" aria-label="A constellation of Grace's projects, essays, paintings, and influences"></svg>

<header class="topbar">
  <p class="kicker">grace wei-li juan</p>
  <h1>a constellation</h1>
  <p class="lede">drag a star to drag the rest. let go to let it settle. click to read.</p>
</header>

<aside class="legend" aria-hidden="false">
  <ul>
    <li><span class="dot dot--project"></span>project</li>
    <li><span class="dot dot--essay"></span>essay</li>
    <li><span class="dot dot--painting"></span>painting</li>
    <li><span class="dot dot--practice"></span>practice</li>
    <li><span class="dot dot--influence"></span>influence</li>
  </ul>
</aside>

<aside class="panel" id="panel" aria-hidden="true">
  <button class="panel__close" id="panelClose" aria-label="close">×</button>
  <div class="panel__inner" id="panelInner"></div>
</aside>

<footer class="footer">
  <p>each visit, the stars find a slightly different place. <span class="dot dot--project"></span><span class="dot dot--essay"></span><span class="dot dot--painting"></span><span class="dot dot--practice"></span><span class="dot dot--influence"></span></p>
</footer>

<script src="script.js" defer></script>
</body>
</html>
