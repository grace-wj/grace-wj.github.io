  </p>

  <button type="button" id="shuffle" class="surface-heading">shuffle 3 random ↻</button>

  <!-- random surface: 3 quotes picked on load -->

  <!-- indexed archive: grouped by source, accordion -->

  <p class="archive-note" id="archive-note"></p>

</main>

<script src="../quotes.js"></script>
<script>
  // ---- text rendering ----
  // text is plain. two conventions:
  //   \n\n  -> paragraph break
  //   *foo* -> <em>foo</em>
  // we render to DOM nodes (not innerHTML) so the text content is always safe.
  function renderText(raw, parent) {
    const paragraphs = (raw || '').split(/\n\n+/);
    for (const para of paragraphs) {
      const p = document.createElement('p');
      // split on *...* runs, preserving alternation
      const parts = para.split(/(\*[^*\n]+\*)/g);
      for (const part of parts) {
        if (part.startsWith('*') && part.endsWith('*') && part.length > 2) {
          const em = document.createElement('em');
          em.textContent = part.slice(1, -1);
          p.appendChild(em);
        } else if (part) {
          p.appendChild(document.createTextNode(part));
        }
      }
      parent.appendChild(p);
    }
  }

  function renderAttribution(source, parent) {
    if (!source) return;
    const cite = document.createElement('cite');
    const bits = [];
    if (source.title) bits.push(source.title);
    if (source.author) bits.push(source.author);
    cite.textContent = bits.join(' — ');
    parent.appendChild(cite);
  }

  function renderQuote(q, parent, opts = {}) {
    const bq = document.createElement('blockquote');
    renderText(q.text, bq);
    if (opts.showAttribution !== false) renderAttribution(q.source, bq);
    parent.appendChild(bq);
  }

  // ---- random surface ----
  const QUOTES = window.QUOTES || [];
  const N_SURFACE = 3;

  function pickRandom(arr, n) {
    const pool = arr.slice();
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      out.push(pool.splice(idx, 1)[0]);
    }
    return out;
  }

  function renderSurface() {
    const el = document.getElementById('quote-surface');
    el.innerHTML = '';
    for (const q of pickRandom(QUOTES, N_SURFACE)) {
      renderQuote(q, el, { showAttribution: true });
    }
  }

  document.getElementById('shuffle').addEventListener('click', renderSurface);
  renderSurface();

  // ---- archive: grouped by source, accordion ----
  function sourceKey(source) {
    if (!source) return '__untagged__';
    return [source.title || '', source.author || ''].join('|');
  }
  function sourceLabel(source) {
    if (!source) return 'fragments';
    const bits = [];
    if (source.title) bits.push(source.title);
    if (source.author) bits.push(source.author);
    return bits.join(' — ');
  }

  const groups = new Map();
  for (const q of QUOTES) {
    const key = sourceKey(q.source);
    if (!groups.has(key)) {
      groups.set(key, { source: q.source, quotes: [] });
    }
    groups.get(key).quotes.push(q);
  }

  // sort: tagged groups by quote count desc, then alpha; untagged last
  const ordered = Array.from(groups.values()).sort((a, b) => {
    if (!a.source && b.source) return 1;
    if (a.source && !b.source) return -1;
    if (b.quotes.length !== a.quotes.length) return b.quotes.length - a.quotes.length;
    return sourceLabel(a.source).localeCompare(sourceLabel(b.source));
  });

  // partition: multi-quote sources (accordion), singletons (flat list),
  // fragments (accordion with all untagged).
  const multiGroups = ordered.filter(g => g.source && g.quotes.length > 1);
  const singletonGroups = ordered.filter(g => g.source && g.quotes.length === 1);
  const untaggedGroup = groups.get('__untagged__');
  const untaggedCount = untaggedGroup ? untaggedGroup.quotes.length : 0;

  const note = document.getElementById('archive-note');
  const noteBits = [
    `${QUOTES.length} quotes across ${multiGroups.length + singletonGroups.length} sources`,
  ];
  if (untaggedCount) noteBits.push(`${untaggedCount} still untagged in fragments`);
  note.textContent = noteBits.join(' — ') + '.';

  const archive = document.getElementById('quote-archive');

  function addSectionLabel(text) {
    const h = document.createElement('h3');
    h.className = 'archive-section-label';
    h.textContent = text;
    archive.appendChild(h);
  }

  // ---- multi-quote accordion ----
  for (const group of multiGroups) {
    const details = document.createElement('details');
    details.className = 'archive-group';

    const summary = document.createElement('summary');
    const label = document.createElement('span');
    label.className = 'archive-label';
    label.textContent = sourceLabel(group.source);
    summary.appendChild(label);
    const count = document.createElement('span');
    count.className = 'archive-count';
    count.textContent = group.quotes.length;
    summary.appendChild(count);
    details.appendChild(summary);

    const inner = document.createElement('div');
    inner.className = 'archive-quotes';
    for (const q of group.quotes) {
      // inside a group, don't repeat the attribution on every quote
      renderQuote(q, inner, { showAttribution: false });
    }
    details.appendChild(inner);

    archive.appendChild(details);
  }

  // ---- singletons: flat list, no click required ----
  if (singletonGroups.length) {
    addSectionLabel('single lines');
    const wrap = document.createElement('div');
    wrap.className = 'singletons';
    for (const group of singletonGroups) {
      const item = document.createElement('div');
      item.className = 'single-line';
      const bq = document.createElement('blockquote');
      renderText(group.quotes[0].text, bq);
      renderAttribution(group.source, bq);
      item.appendChild(bq);
      wrap.appendChild(item);
    }
    archive.appendChild(wrap);
  }

  // ---- fragments (untagged), if any ----
  if (untaggedGroup) {
    addSectionLabel('fragments');
    const details = document.createElement('details');
    details.className = 'archive-group fragments';
    const summary = document.createElement('summary');
    const label = document.createElement('span');
    label.className = 'archive-label';
    label.textContent = `${untaggedCount} untagged`;
    summary.appendChild(label);
    const count = document.createElement('span');
    count.className = 'archive-count';
    count.textContent = untaggedCount;
    summary.appendChild(count);
    details.appendChild(summary);

    const inner = document.createElement('div');
    inner.className = 'archive-quotes';
    for (const q of untaggedGroup.quotes) {
      renderQuote(q, inner, { showAttribution: false });
    }
    details.appendChild(inner);
    archive.appendChild(details);
  }
</script>
