<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="logo" href="/" aria-label="Home">
      <svg viewBox="0 0 36 36" aria-hidden="true">
        <!-- placeholder logo: replace this <svg> block with your own mark -->
        <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <text x="18" y="25" text-anchor="middle"
              font-family="EB Garamond, serif" font-style="italic"
              font-weight="700" font-size="20" fill="currentColor">g</text>
      </svg>
    </a>
    <nav class="site-nav" aria-label="primary">
      <a href="/posts/">Writing</a>
      <a href="/reading/">Reading</a>
      <a href="/#projects" aria-current="page">Projects</a>
      <a href="/resume.pdf">Resume</a>
      <a href="/design/">Design</a>
    </nav>
  </div>
</header>

<main>

  <header class="intro">
    <p class="tagline">
      software engineer. berkeley cs + cogsci '25. currently at c3 ai.
    </p>
    <p class="bio">
      i like making interfaces that turn abstract systems into things you can
      see and poke at — agent reasoning, search results, ideas. currently
      working on aperture, a visual debugger for ai agents.
    </p>
  </header>

  <section id="projects">
    <hr class="section-rule" />
    <ul class="project-list" id="project-list">
      <!-- rendered from projects.js -->
    </ul>
  </section>

</main>

<script src="projects.js"></script>
<script>
  const projectList = document.getElementById('project-list');
  for (const p of (window.PROJECTS || [])) {
    const li = document.createElement('li');
    const year = document.createElement('span');
    year.className = 'year';
    year.textContent = p.year || '';
    li.appendChild(year);
    const titleBlock = document.createElement('div');
    titleBlock.className = 'title-block';
    const a = document.createElement('a');
    a.href = p.url || '#';
    a.textContent = p.name;
    titleBlock.appendChild(a);
    li.appendChild(titleBlock);
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = p.description || '';
    li.appendChild(desc);
    projectList.appendChild(li);
  }
</script>

</body>
</html>
