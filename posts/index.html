<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>writing — grace juan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css" />
</head>
<body>

<main>
  <a class="back" href="../">&larr; home</a>
  <h1 class="label">writing</h1>
  <nav class="tag-filter" id="tag-filter"></nav>
  <ul class="post-list" id="post-list"></ul>
</main>

<script src="../posts.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const activeTag = params.get('tag');

  // build tag filter row from all tags present in posts.js
  const allTags = Array.from(new Set(
    (window.POSTS || []).flatMap(p => p.tags || [])
  )).sort();
  const filterEl = document.getElementById('tag-filter');
  const allLink = document.createElement('a');
  allLink.href = './';
  allLink.textContent = 'all';
  if (!activeTag) allLink.classList.add('active');
  filterEl.appendChild(allLink);
  for (const tag of allTags) {
    const a = document.createElement('a');
    a.href = '?tag=' + encodeURIComponent(tag);
    a.textContent = tag;
    if (activeTag === tag) a.classList.add('active');
    filterEl.appendChild(a);
  }

  // render filtered post list
  const list = document.getElementById('post-list');
  const posts = (window.POSTS || [])
    .filter(p => !activeTag || (p.tags || []).includes(activeTag))
    .slice()
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  for (const post of posts) {
    const li = document.createElement('li');
    if (post.date) {
      const d = document.createElement('span');
      d.className = 'date';
      d.textContent = post.date;
      li.appendChild(d);
    }
    const a = document.createElement('a');
    a.href = post.slug + '.html';
    a.textContent = post.title;
    li.appendChild(a);
    for (const tag of (post.tags || [])) {
      const t = document.createElement('a');
      t.className = 'tag';
      t.href = '?tag=' + encodeURIComponent(tag);
      t.textContent = tag;
      li.appendChild(t);
    }
    if (post.summary) {
      const s = document.createElement('span');
      s.className = 'desc';
      s.textContent = post.summary;
      li.appendChild(s);
    }
    list.appendChild(li);
  }
</script>

</body>
</html>
