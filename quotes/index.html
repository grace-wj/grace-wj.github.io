<script src="../quotes.js"></script>
<script>
  // ---- text rendering ----
  // text is plain. two conventions:
  //   \n\n  -> paragraph break
  //   *foo* -> <em>foo</em>
  // we render to DOM nodes (not innerHTML) so the text content is always safe.
  function renderText(raw, parent) {
    const paragraphs = (raw || '').split(/\n\n+/);
    for (const para of paragraphs) {
      const p = document.createElement('p');
      // split on *...* runs, preserving alternation
      const parts = para.split(/(\*[^*\n]+\*)/g);
      for (const part of parts) {
        if (part.startsWith('*') && part.endsWith('*') && part.length > 2) {
          const em = document.createElement('em');
          em.textContent = part.slice(1, -1);
          p.appendChild(em);
        } else if (part) {
          p.appendChild(document.createTextNode(part));
        }
      }
      parent.appendChild(p);
    }
  }

  function renderAttribution(source, parent) {
    if (!source) return;
    const cite = document.createElement('cite');
    const bits = [];
    if (source.title) bits.push(source.title);
    if (source.author) bits.push(source.author);
    cite.textContent = bits.join(' — ');
    parent.appendChild(cite);
  }

  function renderQuote(q, parent, opts = {}) {
    const bq = document.createElement('blockquote');
    renderText(q.text, bq);
    if (opts.showAttribution !== false) renderAttribution(q.source, bq);
    parent.appendChild(bq);
  }

  // ---- random surface ----
  const QUOTES = window.QUOTES || [];
  const N_SURFACE = 3;

  function pickRandom(arr, n) {
    const pool = arr.slice();
    const out = [];
    for (let i = 0; i < n && pool.length; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      out.push(pool.splice(idx, 1)[0]);
    }
    return out;
  }

  function renderSurface() {
    const el = document.getElementById('quote-surface');
    el.innerHTML = '';
    for (const q of pickRandom(QUOTES, N_SURFACE)) {
      renderQuote(q, el, { showAttribution: true });
    }
  }

  document.getElementById('shuffle').addEventListener('click', renderSurface);
  renderSurface();

  // ---- archive: grouped by theme, accordion ----
  // a quote with multiple themes appears under each one.
  const THEMES = ['mind', 'choice', 'art', 'philosophy', 'people', 'time', 'self', 'imagination', 'power', 'misc'];

  // used to collapse consecutive quotes from the same source within a theme
  function sourceKey(s) {
    if (!s) return '';
    return (s.title || '') + '|' + (s.author || '');
  }

  const byTheme = new Map(THEMES.map(t => [t, []]));
  for (const q of QUOTES) {
    for (const t of (q.themes || [])) {
      if (byTheme.has(t)) byTheme.get(t).push(q);
    }
  }

  const note = document.getElementById('archive-note');
  note.textContent = `${QUOTES.length} quotes across ${THEMES.length} themes — some appear under more than one.`;

  const archive = document.getElementById('quote-archive');

  for (const theme of THEMES) {
    const quotes = byTheme.get(theme);
    if (!quotes.length) continue;

    const details = document.createElement('details');
    details.className = 'archive-group';

    const summary = document.createElement('summary');
    const label = document.createElement('span');
    label.className = 'archive-label';
    label.textContent = theme;
    summary.appendChild(label);
    const count = document.createElement('span');
    count.className = 'archive-count';
    count.textContent = quotes.length;
    summary.appendChild(count);
    details.appendChild(summary);

    const inner = document.createElement('div');
    inner.className = 'archive-quotes';
    // collapse runs of consecutive quotes from the same source: show attribution
    // only on the last quote in each run (or when the source is null/untagged).
    for (let i = 0; i < quotes.length; i++) {
      const q = quotes[i];
      const next = quotes[i + 1];
      const showAttr = !next || sourceKey(q.source) !== sourceKey(next.source);
      renderQuote(q, inner, { showAttribution: showAttr });
    }
    details.appendChild(inner);

    archive.appendChild(details);
  }
</script>
