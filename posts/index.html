<main>
  <p class="writing-intro">
    essays, mostly on consciousness, perception, and the ways thinking goes sideways. some new, some pulled from old journals.
  </p>
  <nav class="tag-filter" id="tag-filter"></nav>
  <p class="tag-note" id="tag-note" hidden></p>
  <ul class="post-list" id="post-list"></ul>
</main>

<script src="../posts.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const activeTag = params.get('tag');
  const isRecent = params.get('sort') === 'recent';

  // posts marked { private: true } in posts.js are excluded from the archive
  // and tag filter. their files still resolve by direct URL.
  const visiblePosts = (window.POSTS || []).filter(p => !p.private);

  // build tag filter row from all tags present in posts.js
  const allTags = Array.from(new Set(
    visiblePosts.flatMap(p => p.tags || [])
  )).sort();
  const filterEl = document.getElementById('tag-filter');

  const topLink = document.createElement('a');
  topLink.href = './';
  topLink.textContent = 'top';
  if (!activeTag && !isRecent) topLink.classList.add('active');
  filterEl.appendChild(topLink);

  const recentLink = document.createElement('a');
  recentLink.href = '?sort=recent';
  recentLink.textContent = 'recent';
  if (isRecent) recentLink.classList.add('active');
  filterEl.appendChild(recentLink);

  for (const tag of allTags) {
    const a = document.createElement('a');
    a.href = '?tag=' + encodeURIComponent(tag);
    a.textContent = tag;
    if (activeTag === tag) a.classList.add('active');
    filterEl.appendChild(a);
  }

  if (activeTag === 'personal') {
    const note = document.getElementById('tag-note');
    note.textContent = 'want to get to know me?';
    note.hidden = false;
  }

  // render filtered post list. "top" and tag views preserve the order defined
  // in posts.js; "recent" re-sorts by date descending.
  const list = document.getElementById('post-list');
  const posts = visiblePosts
    .filter(p => !activeTag || (p.tags || []).includes(activeTag))
    .slice();
  if (isRecent) {
    posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }
  for (const post of posts) {
    const li = document.createElement('li');
    const d = document.createElement('span');
    d.className = 'date';
    d.textContent = post.date || '';
    li.appendChild(d);
    const titleBlock = document.createElement('div');
    titleBlock.className = 'title-block';
    const a = document.createElement('a');
    a.href = post.slug + '.html';
    a.textContent = post.title;
    titleBlock.appendChild(a);
    for (const tag of (post.tags || [])) {
      const t = document.createElement('a');
      t.className = 'tag';
      t.href = '?tag=' + encodeURIComponent(tag);
      t.textContent = tag;
      titleBlock.appendChild(t);
    }
    li.appendChild(titleBlock);
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = post.summary || '';
    li.appendChild(desc);
    list.appendChild(li);
  }
</script>
